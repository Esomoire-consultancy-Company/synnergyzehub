services:
  postgres:
    image: postgres:16
    container_name: synnergyze_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synnergyze
      POSTGRES_PASSWORD: synnergyze_dev_password
      POSTGRES_DB: synnergyze_seed
    ports:
      - "5432:5432"
    volumes:
      - synnergyze_pgdata:/var/lib/postgresql/data
      - ../packages/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: synnergyze_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: synnergyze_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: synnergyze
      MINIO_ROOT_PASSWORD: synnergyze_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - synnergyze_minio:/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: synnergyze_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://synnergyze:synnergyze_dev_password@postgres:5432/synnergyze_seed
    depends_on:
      - postgres
    ports:
      - "8000:8000"

volumes:
  synnergyze_pgdata:
  synnergyze_minio:
